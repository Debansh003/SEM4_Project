<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup — EnergyPredict</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
<script src="/static/theme.js"></script>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div id="particles-js"></div>
<div id="cursor-glow"></div>

<div class="auth-screen">
  <div class="card auth-card">

    <div class="auth-header">
      <div class="auth-logo">⚡</div>
      <h1>Create account</h1>
      <p>Start predicting your renewable energy output</p>
    </div>

    <div class="section-label">New Account</div>

    <form action="/signup-submit" method="POST">
      <div class="form-group">
        <label><i class="fa fa-user"></i> Full Name</label>
        <div class="input-wrap">
          <i class="fa fa-user"></i>
          <input type="text" name="name" placeholder="Jane Smith" required autocomplete="name">
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa fa-envelope"></i> Email Address</label>
        <div class="input-wrap">
          <i class="fa fa-envelope"></i>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa fa-key"></i> Password</label>
        <div class="input-wrap">
          <i class="fa fa-key"></i>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fa fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="divider">already registered?</div>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>

    <div style="text-align:center;margin-top:22px">
      <button onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js" crossorigin="anonymous"></script>

<script>
particlesJS('particles-js', {
  particles: {
    number: { value: 45 }, color: { value: '#00d4ff' }, shape: { type: 'circle' },
    opacity: { value: 0.15, random: true }, size: { value: 1.8, random: true },
    line_linked: { enable: true, distance: 120, color: '#00d4ff', opacity: 0.07, width: 1 },
    move: { enable: true, speed: 0.65, random: true, out_mode: 'out' }
  },
  interactivity: { detect_on: 'canvas', events: { onhover: { enable: true, mode: 'grab' } } }
});

document.addEventListener('mousemove', e => {
  const g = document.getElementById('cursor-glow');
  if (g) { g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px'; }
});

gsap.from('.auth-card', { y: 30, opacity: 0, duration: 0.8, ease: 'power3.out' });
</script>
</body>
</html>
