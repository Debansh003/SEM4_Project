<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="style.css">
    <script src="/theme.js"></script>
    <script src="/auth.js" defer></script>
</head>
<body>

<nav>
    <h2>EnergyPredict</h2>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
</nav>

<div class="hero">
    <h1>Result</h1>
</div>

<div class="card">
    <h2 id="energyValue">--</h2>
    <p>kWh/day</p>

    <a href="/">Calculate Again</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const energy = params.get("energy");

document.getElementById("energyValue").innerText =
    energy ? parseFloat(energy).toFixed(2) : "No Data";
</script>

</body>
</html>
