<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — EnergyPredict</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" crossorigin="anonymous">
  <script src="/theme.js"></script>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div id="particles-js"></div>
<div id="cursor-glow"></div>

<nav id="navbar">
  <a href="/" class="nav-brand">
    <div class="nav-logo">⚡</div>
    <h2>EnergyPredict</h2>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact" class="active">Contact</a>
    <a href="/logout" class="nav-logout"><i class="fa fa-right-from-bracket"></i> Logout</a>
    <button onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</nav>

<div class="page-wrap pt-nav">

  <div class="hero" data-aos="fade-down" data-aos-duration="600">
    <div class="hero-eyebrow"><span class="pulse-dot"></span> Get In Touch</div>
    <h1>Contact <span class="grad">Us</span></h1>
    <p class="hero-desc">Have feedback, questions, or a feature idea? We'd love to hear from you.</p>
  </div>

  <div class="card" data-aos="fade-up" data-aos-duration="700" data-aos-delay="100">
    <div class="contact-meta">
      <div class="meta-item"><div class="meta-icon"><i class="fa fa-bolt" style="color:var(--accent)"></i></div><span>EnergyPredict</span></div>
      <div class="meta-item"><div class="meta-icon"><i class="fa fa-leaf" style="color:var(--green)"></i></div><span>Renewable Energy Tools</span></div>
      <div class="meta-item"><div class="meta-icon"><i class="fa fa-code" style="color:var(--gold)"></i></div><span>Open Source Project</span></div>
      <div class="meta-item"><div class="meta-icon"><i class="fa fa-globe" style="color:var(--accent2)"></i></div><span>Built with Node.js</span></div>
    </div>

    <div class="section-label">Send a Message</div>

    <form action="/contact-submit" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label><i class="fa fa-user"></i> Name</label>
          <div class="input-wrap"><i class="fa fa-user"></i>
            <input type="text" name="name" placeholder="Jane Smith" required></div>
        </div>
        <div class="form-group">
          <label><i class="fa fa-envelope"></i> Email</label>
          <div class="input-wrap"><i class="fa fa-envelope"></i>
            <input type="email" name="email" placeholder="you@example.com" required></div>
        </div>
      </div>
      <div class="form-group">
        <label><i class="fa fa-comment"></i> Message</label>
        <textarea name="message" placeholder="Tell us what's on your mind..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fa fa-paper-plane"></i> Send Message
      </button>
    </form>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js" crossorigin="anonymous"></script>
<script>
AOS.init({once:true,offset:30});
particlesJS('particles-js',{particles:{number:{value:40},color:{value:'#00d4ff'},shape:{type:'circle'},opacity:{value:0.14,random:true},size:{value:1.8,random:true},line_linked:{enable:true,distance:115,color:'#00d4ff',opacity:0.07,width:1},move:{enable:true,speed:0.6,random:true,out_mode:'out'}},interactivity:{detect_on:'canvas',events:{onhover:{enable:true,mode:'grab'}}}});
document.addEventListener('mousemove',e=>{const g=document.getElementById('cursor-glow');if(g){g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';}});
window.addEventListener('scroll',()=>{document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20);});
gsap.from('#navbar',{y:-20,opacity:0,duration:0.7,ease:'power3.out'});

const ta=document.querySelector('textarea[name="message"]');
if(ta){ta.addEventListener('input',()=>{const len=ta.value.length;let h=ta.parentElement.querySelector('.input-hint');if(!h){h=document.createElement('div');h.className='input-hint';ta.parentElement.appendChild(h);}h.textContent=`${len} character${len!==1?'s':''}`;h.style.color=len>10?'var(--green)':'var(--text-dim)';});}
</script>
</body>
</html>
