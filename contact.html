<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — EnergyPredict</title>
  <link rel="stylesheet" href="style.css">
  <script src="/theme.js"></script>
  <script src="/auth.js" defer></script>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon">⚡</div>
    <h2>EnergyPredict</h2>
  </a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact" class="active">Contact</a>
    <a href="/login">Login</a>
    <a href="/signup" class="nav-cta">Signup</a>
    <button onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</nav>

<div class="page">

  <div class="hero fade-in">
    <div class="hero-eyebrow">✉️ Get in Touch</div>
    <h1>Contact <span>Us</span></h1>
    <p>Have a question, suggestion, or feedback? We'd love to hear from you.</p>
  </div>

  <div class="card fade-in">

    <div class="contact-info">
      <div class="info-item">
        <span class="info-icon">⚡</span>
        <span>EnergyPredict</span>
      </div>
      <div class="info-item">
        <span class="info-icon">🌍</span>
        <span>Renewable Energy Tools</span>
      </div>
    </div>

    <div class="section-label">Send a Message</div>

    <form action="/contact-submit" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" name="name" id="name" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea name="message" id="message" placeholder="Tell us what's on your mind..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Send Message →
      </button>
    </form>

  </div>

</div>

</body>
</html>
