<!DOCTYPE html>
<html>
<head>
    <title>EnergyPredict</title>

    <link rel="stylesheet" href="style.css">

    <script src="/theme.js"></script>
    <script src="/auth.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>
<body>

<div id="particles-js"></div>

<nav>
    <h2>EnergyPredict</h2>
    <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/login">Login</a>
        <a href="/signup">Signup</a>
        <button onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
</nav>

<div class="hero">
    <h1>Wind & Solar Energy Prediction</h1>
</div>

<div class="card">
    <h2>Solar Energy Prediction</h2>

    <form action="/predict" method="POST">
        <input type="number" name="area" placeholder="Area (m²) (Avg: 10–20)" required>
        <input type="number" name="efficiency" placeholder="Efficiency (0.15–0.22)" required>
        <input type="number" name="irradiance" placeholder="Irradiance (4–6)" required>
        <input type="number" name="pr" placeholder="PR (0.75–0.9)" required>
        <button type="submit">Calculate</button>
    </form>
</div>

<div class="card">
    <h2>Wind Energy Prediction</h2>

    <form action="/predict-wind" method="POST">
        <input type="number" name="area" placeholder="Rotor Area (10–50)" required>
        <input type="number" name="airDensity" placeholder="Air Density (1.225)" required>
        <input type="number" name="velocity" placeholder="Wind Speed (3–12)" required>
        <input type="number" name="cp" placeholder="Cp (0.3–0.5)" required>
        <input type="number" name="efficiency" placeholder="Efficiency (0.7–0.9)" required>
        <button type="submit">Calculate</button>
    </form>
</div>

<script>
particlesJS("particles-js", {
  particles: { number: { value: 60 }, size: { value: 3 } }
});
</script>

</body>
</html>
